name: 🚀 Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'frontend/**'
      - 'data/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同时只允许一个部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏗️ Build site structure
        run: |
          mkdir -p _site
          # 把 frontend 的文件复制到根
          cp -r frontend/* _site/
          # 数据文件复制到 data/
          mkdir -p _site/data
          cp -r data/* _site/data/ 2>/dev/null || true

          # 调整前端的 data 路径为相对当前目录
          # 因为 GitHub Pages 部署后路径变了
          sed -i "s|'../data/dashboard.json'|'./data/dashboard.json'|g" _site/app.js

          ls -la _site

      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
