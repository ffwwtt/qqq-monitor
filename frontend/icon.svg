<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0a0a0a"/>
  <!-- Candlestick bars -->
  <g fill="#4ade80">
    <rect x="100" y="200" width="40" height="180" rx="4"/>
    <line x1="120" y1="160" x2="120" y2="200" stroke="#4ade80" stroke-width="6"/>
    <line x1="120" y1="380" x2="120" y2="410" stroke="#4ade80" stroke-width="6"/>

    <rect x="180" y="160" width="40" height="220" rx="4"/>
    <line x1="200" y1="120" x2="200" y2="160" stroke="#4ade80" stroke-width="6"/>
    <line x1="200" y1="380" x2="200" y2="400" stroke="#4ade80" stroke-width="6"/>
  </g>
  <g fill="#ef4444">
    <rect x="260" y="220" width="40" height="160" rx="4"/>
    <line x1="280" y1="190" x2="280" y2="220" stroke="#ef4444" stroke-width="6"/>
    <line x1="280" y1="380" x2="280" y2="420" stroke="#ef4444" stroke-width="6"/>
  </g>
  <g fill="#4ade80">
    <rect x="340" y="140" width="40" height="240" rx="4"/>
    <line x1="360" y1="100" x2="360" y2="140" stroke="#4ade80" stroke-width="6"/>
    <line x1="360" y1="380" x2="360" y2="400" stroke="#4ade80" stroke-width="6"/>
  </g>
  <!-- QQQ text -->
  <text x="256" y="470" font-family="monospace" font-size="56" font-weight="bold" fill="#f5f5f4" text-anchor="middle">QQQ</text>
</svg>
